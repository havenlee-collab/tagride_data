<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TagRide Business Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── CSV URLs ─────────────────────────────────────────────────────────────────
   Google Sheets → 파일 → 공유 → 웹에 게시 → 각 시트 선택 → CSV → URL 복사
   아래 JS CONFIG 섹션의 SHEET_URLS 를 교체하세요.
──────────────────────────────────────────────────────────────────────────────── */

:root {
  --bg: #0f0f11;
  --bg2: #17171a;
  --bg3: #1e1e22;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0eff0;
  --text2: #888890;
  --text3: #555560;
  --accent: #4ade9a;
  --accent2: #3bc280;
  --accent-dim: rgba(74,222,154,0.12);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.12);
  --red: #f87171;
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.12);
  --radius: 10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

.layout { display: grid; grid-template-columns: 200px 1fr; min-height: 100vh; }

/* ─── Sidebar ─── */
.sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 24px 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.logo {
  padding: 0 20px 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.logo-tag {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}
.logo-title { font-size: 15px; font-weight: 500; color: var(--text); }
.logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

.nav-section { padding: 0 12px; margin-bottom: 8px; }
.nav-label {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0 8px;
  margin-bottom: 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 8px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--text2);
  font-size: 13px;
  transition: all 0.15s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--accent-dim); color: var(--accent); }
.nav-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  background: var(--text3);
}
.nav-item.active .nav-dot { background: var(--accent); }

.sidebar-footer {
  padding: 16px 20px 0;
  margin-top: auto;
  border-top: 1px solid var(--border);
}
.filter-bar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 12px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  position: sticky;
  top: 65px;
  z-index: 9;
}
.filter-label { font-size: 11px; color: var(--text3); white-space: nowrap; }
.filter-group { display: flex; align-items: center; gap: 6px; }
.filter-sep { width: 1px; height: 18px; background: var(--border2); margin: 0 4px; }
.quick-btns { display: flex; background: var(--bg3); border-radius: var(--radius-sm); padding: 3px; gap: 2px; }
.quick-btn {
  padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;
  border: none; background: none; color: var(--text2); font-family: 'DM Sans', sans-serif;
  transition: all 0.15s; white-space: nowrap;
}
.quick-btn.active { background: var(--bg); color: var(--text); }
.date-input {
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text2); font-size: 11px; padding: 4px 8px; font-family: 'DM Mono', monospace;
  outline: none; width: 100px;
}
.date-input:focus { border-color: var(--border2); color: var(--text); }
.filter-apply {
  padding: 5px 14px; border-radius: var(--radius-sm); font-size: 11px; cursor: pointer;
  border: 1px solid var(--accent); background: var(--accent-dim); color: var(--accent);
  font-family: 'DM Sans', sans-serif; transition: all 0.15s; white-space: nowrap;
}
.filter-apply:hover { background: var(--accent); color: var(--bg); }

/* ─── Main ─── */
.main { overflow-y: auto; height: 100vh; }

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
}
.topbar-title { font-size: 16px; font-weight: 500; }
.topbar-right { display: flex; align-items: center; gap: 10px; }

.period-btns { display: flex; background: var(--bg3); border-radius: var(--radius-sm); padding: 3px; gap: 2px; }
.period-btn {
  padding: 5px 14px;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.period-btn.active { background: var(--bg2); color: var(--text); }

.refresh-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.refresh-btn:hover { color: var(--text); border-color: var(--border2); }
.refresh-btn.loading { opacity: 0.5; pointer-events: none; }

.content { padding: 24px 28px; }

/* ─── Section ─── */
.section { margin-bottom: 32px; }
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.section-num {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 2px 7px;
  border-radius: 20px;
}
.section-num.blue { color: var(--blue); background: var(--blue-dim); }
.section-num.amber { color: var(--amber); background: var(--amber-dim); }
.section-title { font-size: 13px; font-weight: 500; color: var(--text2); }
.section-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  background: var(--amber-dim);
  color: var(--amber);
  font-family: 'DM Mono', monospace;
}

/* ─── KPI cards ─── */
.kpi-grid { display: grid; gap: 8px; margin-bottom: 10px; }
.kpi-grid.c2 { grid-template-columns: repeat(2, minmax(0,1fr)); }
.kpi-grid.c3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
.kpi-grid.c4 { grid-template-columns: repeat(4, minmax(0,1fr)); }

.kpi {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  transition: border-color 0.15s;
}
.kpi:hover { border-color: var(--border2); }
.kpi-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; letter-spacing: 0.02em; }
.kpi-val {
  font-size: 22px;
  font-weight: 300;
  color: var(--text);
  line-height: 1;
  font-family: 'DM Sans', sans-serif;
  margin-bottom: 5px;
}
.kpi-val.mono { font-family: 'DM Mono', monospace; font-size: 18px; }
.kpi-delta { font-size: 11px; display: flex; align-items: center; gap: 4px; }
.up { color: var(--accent); }
.dn { color: var(--red); }
.neu { color: var(--text3); }
.warn { color: var(--amber); }

/* ─── Chart cards ─── */
.chart-grid { display: grid; gap: 8px; }
.chart-grid.c2 { grid-template-columns: repeat(2, minmax(0,1fr)); }
.chart-grid.c21 { grid-template-columns: minmax(0,2fr) minmax(0,1fr); }

.chart-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
}
.chart-card-title { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.chart-card-sub { font-size: 11px; color: var(--text3); margin-bottom: 14px; }
.chart-wrap { position: relative; width: 100%; }

/* ─── Bar rank ─── */
.bar-rank { display: flex; flex-direction: column; gap: 7px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-num { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); width: 14px; text-align: right; }
.bar-label-text { font-size: 11px; color: var(--text2); width: 60px; flex-shrink: 0; }
.bar-track { flex: 1; background: var(--bg3); border-radius: 2px; height: 4px; }
.bar-fill { height: 4px; border-radius: 2px; background: var(--accent); }
.bar-val-text { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); width: 40px; text-align: right; }

.last-updated { font-size: 11px; color: var(--text3); }
.last-updated span { color: var(--text2); font-family: 'DM Mono', monospace; }
.loading-screen {
  display: flex; align-items: center; justify-content: center;
  height: 60vh; flex-direction: column; gap: 12px;
}
.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 12px; color: var(--text3); }

.error-card {
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: var(--radius);
  padding: 16px 20px;
  font-size: 12px;
  color: var(--red);
  margin-bottom: 16px;
}

/* ─── Divider ─── */
.divider { height: 1px; background: var(--border); margin: 8px 0 24px; }

.no-data { font-size: 12px; color: var(--text3); padding: 20px 0; text-align: center; }

@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .kpi-grid.c3, .kpi-grid.c4 { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .chart-grid.c21 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="layout">

  <!-- ─── Sidebar ─── -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-tag">TAGRIDE</div>
      <div class="logo-title">Business Dashboard</div>
      <div class="logo-sub">G-Bike · GCOO Platform</div>
    </div>
    <nav class="nav-section">
      <div class="nav-label">지표</div>
      <button class="nav-item active" onclick="scrollTo('sec-usage')">
        <span class="nav-dot"></span> 사용량
      </button>
      <button class="nav-item" onclick="scrollTo('sec-demand')">
        <span class="nav-dot"></span> 신규 수요 검증
      </button>
      <button class="nav-item" onclick="scrollTo('sec-revenue')">
        <span class="nav-dot"></span> 수익
      </button>
      <button class="nav-item" onclick="scrollTo('sec-device')">
        <span class="nav-dot"></span> 기기 운영
      </button>
    </nav>
    <nav class="nav-section">
      <div class="nav-label">분석</div>
      <button class="nav-item" onclick="scrollTo('sec-quality')">
        <span class="nav-dot"></span> 라이드 품질
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="last-updated">마지막 업데이트<br><span id="lastUpdated">—</span></div>
    </div>
  </aside>

  <!-- ─── Main ─── -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">사용량</div>
      <div class="topbar-right">
        <div class="period-btns">
          <button class="period-btn active" onclick="setPeriod('monthly', this)">월</button>
          <button class="period-btn" onclick="setPeriod('weekly', this)">주</button>
          <button class="period-btn" onclick="setPeriod('daily', this)">일</button>
        </div>
        <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M10 6A4 4 0 1 1 6 2c1.1 0 2.1.45 2.83 1.17L10 2v4H6l1.59-1.59A2.5 2.5 0 1 0 8.5 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          새로고침
        </button>
      </div>
    </div>

    <div class="filter-bar">
      <div class="filter-group">
        <span class="filter-label">기간</span>
        <div class="quick-btns">
          <button class="quick-btn" onclick="setQuickDate(3, this)">3M</button>
          <button class="quick-btn" onclick="setQuickDate(6, this)">6M</button>
          <button class="quick-btn" onclick="setQuickDate(12, this)">12M</button>
          <button class="quick-btn active" onclick="setQuickDate(0, this)">전체</button>
        </div>
        <input class="date-input" type="month" id="dateFrom" oninput="onDateInput()">
        <span style="font-size:11px;color:var(--text3);">~</span>
        <input class="date-input" type="month" id="dateTo" oninput="onDateInput()">
      </div>
      <button class="filter-apply" onclick="applyFilters()">적용</button>
    </div>

    <div class="content" id="mainContent">
      <div class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">데이터 불러오는 중...</div>
      </div>
    </div>
  </main>
</div>

<script>
/* ══════════════════════════════════════════════════════════════════
   CONFIG — Google Sheets CSV URL 교체 영역
   Sheets → 파일 → 공유 → 웹에 게시 → 시트 선택 → CSV → URL 복사
══════════════════════════════════════════════════════════════════ */
const SHEET_URLS = {
  monthly:    'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnRBv3qbRNxUkFenEeB95nMlfJwAkdc_r5xLG9mRSC-kccEX51vSZgapG7vY9y9Z0qV4Yk64oNRJlz/pub?gid=800920326&single=true&output=csv',
  weekly:     'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnRBv3qbRNxUkFenEeB95nMlfJwAkdc_r5xLG9mRSC-kccEX51vSZgapG7vY9y9Z0qV4Yk64oNRJlz/pub?gid=1748082162&single=true&output=csv',
  daily:      'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnRBv3qbRNxUkFenEeB95nMlfJwAkdc_r5xLG9mRSC-kccEX51vSZgapG7vY9y9Z0qV4Yk64oNRJlz/pub?gid=1657948247&single=true&output=csv',
  hourly:     'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnRBv3qbRNxUkFenEeB95nMlfJwAkdc_r5xLG9mRSC-kccEX51vSZgapG7vY9y9Z0qV4Yk64oNRJlz/pub?gid=917682227&single=true&output=csv',
  region:     'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnRBv3qbRNxUkFenEeB95nMlfJwAkdc_r5xLG9mRSC-kccEX51vSZgapG7vY9y9Z0qV4Yk64oNRJlz/pub?gid=442805510&single=true&output=csv',
  new_demand: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnRBv3qbRNxUkFenEeB95nMlfJwAkdc_r5xLG9mRSC-kccEX51vSZgapG7vY9y9Z0qV4Yk64oNRJlz/pub?gid=1718712541&single=true&output=csv',
  device:     'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnRBv3qbRNxUkFenEeB95nMlfJwAkdc_r5xLG9mRSC-kccEX51vSZgapG7vY9y9Z0qV4Yk64oNRJlz/pub?gid=634289511&single=true&output=csv',
};

/* ══════════════════════════════════════════════════════════════════
   샘플 데이터 — URL 설정 전 미리보기용 (URL 교체 후 자동 무시됨)
══════════════════════════════════════════════════════════════════ */
const SAMPLE = {
  monthly: [
    {ym:'2025-04',ride_count:1320,completed_rides:1244,mau:498,total_revenue:3838800,rpr:2904,operated_devices:82,completion_rate:94.2,force_shutdown_cnt:12,force_shutdown_rate:0.9,total_duration_min:15480,avg_duration_min:12.4},
    {ym:'2025-05',ride_count:1510,completed_rides:1422,mau:534,total_revenue:4131048,rpr:2904,operated_devices:85,completion_rate:94.2,force_shutdown_cnt:14,force_shutdown_rate:0.9,total_duration_min:17624,avg_duration_min:12.4},
    {ym:'2025-06',ride_count:1680,completed_rides:1582,mau:571,total_revenue:4594128,rpr:2904,operated_devices:88,completion_rate:94.2,force_shutdown_cnt:16,force_shutdown_rate:1.0,total_duration_min:19616,avg_duration_min:12.4},
    {ym:'2025-07',ride_count:1890,completed_rides:1780,mau:612,total_revenue:5169120,rpr:2904,operated_devices:91,completion_rate:94.2,force_shutdown_cnt:18,force_shutdown_rate:1.0,total_duration_min:22072,avg_duration_min:12.4},
    {ym:'2025-08',ride_count:2120,completed_rides:1997,mau:689,total_revenue:5801688,rpr:2904,operated_devices:95,completion_rate:94.2,force_shutdown_cnt:20,force_shutdown_rate:0.9,total_duration_min:24764,avg_duration_min:12.4},
    {ym:'2025-09',ride_count:2341,completed_rides:2205,mau:752,total_revenue:6403320,rpr:2904,operated_devices:98,completion_rate:94.2,force_shutdown_cnt:22,force_shutdown_rate:0.9,total_duration_min:27341,avg_duration_min:12.4},
  ],
  hourly: [
    {ym:'2025-09',hour:8,ride_count:312},{ym:'2025-09',hour:9,ride_count:241},
    {ym:'2025-09',hour:10,ride_count:198},{ym:'2025-09',hour:17,ride_count:176},
    {ym:'2025-09',hour:18,ride_count:287},{ym:'2025-09',hour:19,ride_count:198},
    {ym:'2025-09',hour:20,ride_count:142},{ym:'2025-09',hour:12,ride_count:120},
  ],
  new_demand: [
    {ym:'2025-04',tagride_rides:520,general_rides:2800,total_rides:3320,tagride_share_pct:15.7},
    {ym:'2025-05',tagride_rides:620,general_rides:2910,total_rides:3530,tagride_share_pct:17.6},
    {ym:'2025-06',tagride_rides:710,general_rides:3050,total_rides:3760,tagride_share_pct:18.9},
    {ym:'2025-07',tagride_rides:780,general_rides:3100,total_rides:3880,tagride_share_pct:20.1},
    {ym:'2025-08',tagride_rides:810,general_rides:3140,total_rides:3950,tagride_share_pct:20.5},
    {ym:'2025-09',tagride_rides:874,general_rides:3210,total_rides:4084,tagride_share_pct:21.4},
  ],
  device: [
    {snapshot_date:'2025-09-30',registered_devices:120},
  ],
  weekly: [],
  daily: [],
};

/* ══════════════════════════════════════════════════════════════════
   State
══════════════════════════════════════════════════════════════════ */
let DATA = {};
let period = 'monthly';
let charts = {};
let filterDateFrom = '';
let filterDateTo = '';

/* ══════════════════════════════════════════════════════════════════
   CSV fetch
══════════════════════════════════════════════════════════════════ */
function isConfigured(key) {
  return SHEET_URLS[key] && !SHEET_URLS[key].startsWith('YOUR_');
}

async function fetchCSV(key) {
  if (!isConfigured(key)) return SAMPLE[key] || [];
  return new Promise((resolve) => {
    Papa.parse(SHEET_URLS[key], {
      download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
      complete: r => resolve(r.data),
      error: () => resolve(SAMPLE[key] || []),
    });
  });
}

async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  try {
    const [monthly, weekly, daily, hourly, new_demand, device] = await Promise.all([
      fetchCSV('monthly'), fetchCSV('weekly'), fetchCSV('daily'),
      fetchCSV('hourly'), fetchCSV('new_demand'), fetchCSV('device'),
    ]);
    DATA = { monthly, weekly, daily, hourly, new_demand, device };
    document.getElementById('lastUpdated').textContent = new Date().toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    initFilters();
    render();
  } catch(e) {
    showError('데이터를 불러오는 중 오류가 발생했어요: ' + e.message);
  } finally {
    btn.classList.remove('loading');
  }
}

/* ══════════════════════════════════════════════════════════════════
   Helpers
══════════════════════════════════════════════════════════════════ */
function fmt(n, digits=0) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('ko-KR', {minimumFractionDigits: digits, maximumFractionDigits: digits});
}
function fmtWon(n) {
  if (n == null || isNaN(n)) return '—';
  if (n >= 1000000) return '₩' + (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return '₩' + Math.round(n/1000) + 'K';
  return '₩' + fmt(n);
}
function delta(curr, prev, unit='%', invert=false) {
  if (!curr || !prev) return '<span class="neu">—</span>';
  const d = ((curr - prev) / prev * 100);
  const cls = invert ? (d > 0 ? 'dn' : 'up') : (d > 0 ? 'up' : 'dn');
  const arrow = d > 0 ? '▲' : '▼';
  return `<span class="${cls}">${arrow} ${Math.abs(d).toFixed(1)}${unit}</span>`;
}
function getPeriodData() { return DATA[period] || []; }
function getLatest() { const d = filteredPeriodData(); return d[d.length - 1] || {}; }
function getPrev() { const d = filteredPeriodData(); return d[d.length - 2] || {}; }
function getLatestMonthly() { const d = filteredMonthly(); return d[d.length-1]||{}; }
function getPrevMonthly() { const d = filteredMonthly(); return d[d.length-2]||{}; }

function filteredPeriodData() {
  let rows = DATA[period] || [];
  const from7 = filterDateFrom ? filterDateFrom.slice(0,7) : '';
  const to7   = filterDateTo   ? filterDateTo.slice(0,7)   : '';
  if (!from7 && !to7) return rows;
  if (period === 'monthly') {
    if (from7) rows = rows.filter(r => (r.ym||'').slice(0,7) >= from7);
    if (to7)   rows = rows.filter(r => (r.ym||'').slice(0,7) <= to7);
  } else if (period === 'weekly') {
    if (from7) rows = rows.filter(r => (r.week_start_date||'').slice(0,7) >= from7);
    if (to7)   rows = rows.filter(r => (r.week_start_date||'').slice(0,7) <= to7);
  } else {
    if (from7) rows = rows.filter(r => (r.dt||'').slice(0,7) >= from7);
    if (to7)   rows = rows.filter(r => (r.dt||'').slice(0,7) <= to7);
  }
  return rows;
}
function filteredMonthly() {
  let rows = DATA.monthly || [];
  const from7 = filterDateFrom ? filterDateFrom.slice(0,7) : '';
  const to7   = filterDateTo   ? filterDateTo.slice(0,7)   : '';
  if (from7) rows = rows.filter(r => (r.ym||'').slice(0,7) >= from7);
  if (to7)   rows = rows.filter(r => (r.ym||'').slice(0,7) <= to7);
  return rows;
}
function filteredHourly() {
  let rows = DATA.hourly || [];
  const from7 = filterDateFrom ? filterDateFrom.slice(0,7) : '';
  const to7   = filterDateTo   ? filterDateTo.slice(0,7)   : '';
  if (from7) rows = rows.filter(r => (r.ym||'').slice(0,7) >= from7);
  if (to7)   rows = rows.filter(r => (r.ym||'').slice(0,7) <= to7);
  return rows;
}
function getRowYm(r) { return r.ym || r.week_label || r.dt || ''; }

function fmtLabel(r) {
  if (period === 'weekly') {
    // week_label: '2025-W36' → 'W36'
    const wl = r.week_label || '';
    return wl.replace(/^\d{4}-/, '');
  }
  if (period === 'daily') {
    // dt: '2025-10-01' → '10/01'
    const dt = r.dt || '';
    return dt.length >= 10 ? dt.slice(5).replace('-', '/') : dt;
  }
  // monthly: '2025-10' → '25.10'
  const ym = r.ym || '';
  return ym.length >= 7 ? ym.slice(2).replace('-', '.') : ym;
}

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};
}

      scales: {

  const allHours = Array.from({length:24},(_,i)=>i);

  const ctx6 = document.getElementById('cHourly');
  if (ctx6) charts.hourly = new Chart(ctx6, {

      plugins: {
        legend: { display: false },

      scales: {
        x: { grid:{color:gc}, ticks:{color:tc, font:{size:9,family:'DM Mono'}, maxRotation:0, callback:(v,i)=>i%4===0?allHours[i]+'시':''} },
        y: { grid:{color:gc}, ticks:{color:tc, font:{size:9,family:'DM Mono'}} },
      }

  /* 신규 수요 */
  const ndRows = (DATA.new_demand||[]).filter(r => {
    const ym = (r.ym||'').slice(0,7);
    if (filterDateFrom && ym < filterDateFrom.slice(0,7)) return false;
    if (filterDateTo   && ym > filterDateTo.slice(0,7))   return false;
    return true;
  });
  const ctx3 = document.getElementById('cDemand');
  if (ctx3) charts.demand = new Chart(ctx3, {
    type: 'bar',
    data: {
      labels: ndRows.map(r => r.ym ? r.ym.slice(2).replace('-', '.') : r.ym),
      datasets: [
        { type: 'line', label:'태그라이드 비중',  data: ndRows.map(r=>r.tagride_share_pct),  borderColor: '#fbbf24', backgroundColor: 'transparent', pointBackgroundColor: '#fbbf24', pointRadius: 3, borderWidth: 1.5, tension: 0.3, yAxisID: 'y2', order: 0 },
        { type: 'bar',  label:'태그라이드',      data: ndRows.map(r=>r.tagride_rides),      backgroundColor: '#4ade9a', borderRadius: 3, yAxisID: 'y', order: 1 },
        { type: 'bar',  label:'일반 트립',        data: ndRows.map(r=>r.general_rides),      backgroundColor: '#3d3d45', borderRadius: 3, yAxisID: 'y', order: 1 },
      ]
    },
    options: { ...chartDefaults,
      scales: {
        x:  { grid:{color:gc}, ticks:{color:tc, font:{size:10,family:'DM Mono'}} },
        y:  { grid:{color:gc}, ticks:{color:tc, font:{size:10,family:'DM Mono'}}, position: 'left' },
        y2: { grid:{display:false}, ticks:{color:tc, font:{size:10,family:'DM Mono'}, callback: v=>v+'%'}, position: 'right' },
      }
    },
  });

  /* 월별 기기 가동률 */
  const regDev = (DATA.device||[]).slice(-1)[0]?.registered_devices || 0;
  const ctxDr = document.getElementById('cDeviceRate');
  if (ctxDr) {
    const mRows = filteredMonthly();
    charts.deviceRate = new Chart(ctxDr, {
      type: 'line',
      data: {
        labels: mRows.map(r => r.ym ? r.ym.slice(2).replace('-', '.') : r.ym),
        datasets: [{
          data: mRows.map(r => (regDev && r.operated_devices != null) ? parseFloat((r.operated_devices / regDev * 100).toFixed(1)) : null),
          borderColor: '#4ade9a',
          backgroundColor: 'rgba(74,222,154,0.08)',
          pointBackgroundColor: '#4ade9a',
          pointRadius: 3,
          borderWidth: 1.5,
          tension: 0.3,
          fill: true,
        }]
      },
      options: { ...chartDefaults,
        scales: {
          x: { grid:{color:gc}, ticks:{color:tc, font:{size:10,family:'DM Mono'}} },
          y: { grid:{color:gc}, ticks:{color:tc, font:{size:10,family:'DM Mono'}, callback: v => v+'%'}, min: 0, max: 100 },
        }
      },
    });
  }

  /* 매출 */
  const ctx4 = document.getElementById('cRevenue');
  if (ctx4) charts.revenue = new Chart(ctx4, {
    type: 'line',
    data: { labels, datasets: [{ data: rows.map(r=>r.total_revenue), borderColor: '#fbbf24', backgroundColor: 'rgba(251,191,36,0.08)', pointBackgroundColor: '#fbbf24', pointRadius: 3, borderWidth: 1.5, tension: 0.3, fill: true }] },
    options: { ...chartDefaults,
      scales: { x:{grid:{color:gc},ticks:{color:tc,font:{size:10,family:'DM Mono'}}}, y:{grid:{color:gc},ticks:{color:tc,font:{size:10,family:'DM Mono'},callback:v=>'₩'+(v>=1000000?(v/1000000).toFixed(1)+'M':v>=1000?Math.round(v/1000)+'K':v)}} }
    },
  });

  /* 품질 */
  const ctx5 = document.getElementById('cQuality');
  if (ctx5) charts.quality = new Chart(ctx5, {
    type: 'line',
    data: { labels, datasets: [
      { data: rows.map(r=>r.completion_rate), borderColor: '#4ade9a', pointBackgroundColor: '#4ade9a', pointRadius: 2, borderWidth: 1.5, tension: 0.3, yAxisID: 'y' },
      { data: rows.map(r=>r.force_shutdown_rate), borderColor: '#f87171', pointBackgroundColor: '#f87171', pointRadius: 2, borderWidth: 1.5, tension: 0.3, yAxisID: 'y2' },
    ]},
    options: { ...chartDefaults,
      scales: {
        x:{grid:{color:gc},ticks:{color:tc,font:{size:10,family:'DM Mono'}}},
        y:{grid:{color:gc},ticks:{color:tc,font:{size:10,family:'DM Mono'},callback:v=>v+'%'},position:'left'},
        y2:{grid:{display:false},ticks:{color:tc,font:{size:10,family:'DM Mono'},callback:v=>v+'%'},position:'right'},
      }
    },
  });

  const ctxTd = document.getElementById('cTotalDuration');
  if (ctxTd) charts.totalDuration = new Chart(ctxTd, {
    type: 'bar',
    data: { labels, datasets: [{ data: rows.map(r=>r.total_duration_min), backgroundColor: '#2d6e54', borderRadius: 3, hoverBackgroundColor: '#4ade9a' }] },
    options: { ...chartDefaults,
      scales: {
        x:{grid:{color:gc},ticks:{color:tc,font:{size:10,family:'DM Mono'}}},
        y:{grid:{color:gc},ticks:{color:tc,font:{size:10,family:'DM Mono'},callback:v=>v+'분'}},
      }
    },
  });

  const ctxAd = document.getElementById('cAvgDuration');
  if (ctxAd) charts.avgDuration = new Chart(ctxAd, {
    type: 'line',
    data: { labels, datasets: [{ data: rows.map(r=>r.avg_duration_min), borderColor: '#60a5fa', pointBackgroundColor: '#60a5fa', backgroundColor: 'rgba(96,165,250,0.06)', pointRadius: 3, borderWidth: 1.5, tension: 0.3, fill: true }] },
    options: { ...chartDefaults,
      scales: {
        x:{grid:{color:gc},ticks:{color:tc,font:{size:10,family:'DM Mono'}}},
        y:{grid:{color:gc},ticks:{color:tc,font:{size:10,family:'DM Mono'},callback:v=>v+'분'}},
      }
    },
  });
}

/* ══════════════════════════════════════════════════════════════════
   Filter functions
══════════════════════════════════════════════════════════════════ */
function initFilters() {
  /* 날짜 초기값 — 전체 */
  const allYms = [...new Set((DATA.monthly||[]).map(r=>r.ym))].sort();
  if (allYms.length) {
    filterDateFrom = allYms[0];
    filterDateTo   = allYms[allYms.length - 1];
    document.getElementById('dateFrom').value = filterDateFrom;
    document.getElementById('dateTo').value   = filterDateTo;
  }
}

function setQuickDate(months, btn) {
  document.querySelectorAll('.quick-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const allYms = [...new Set((DATA.monthly||[]).map(r=>r.ym))].sort();
  if (!allYms.length) return;
  filterDateTo = allYms[allYms.length - 1];
  if (months === 0) {
    filterDateFrom = allYms[0];
  } else {
    const from = new Date(filterDateTo + '-01');
    from.setMonth(from.getMonth() - (months - 1));
    filterDateFrom = from.toISOString().slice(0, 7);
  }
  document.getElementById('dateFrom').value = filterDateFrom;
  document.getElementById('dateTo').value = filterDateTo;
}

function onDateInput() {
  document.querySelectorAll('.quick-btn').forEach(b=>b.classList.remove('active'));
  filterDateFrom = document.getElementById('dateFrom').value;
  filterDateTo   = document.getElementById('dateTo').value;
}

function applyFilters() {
  filterDateFrom = document.getElementById('dateFrom').value;
  filterDateTo   = document.getElementById('dateTo').value;
  render();
}
function scrollTo(id) {
  document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active',
      el.getAttribute('onclick') === `scrollTo('${id}')`
    );
  });
  const titles = { 'sec-usage':'사용량', 'sec-demand':'신규 수요 검증', 'sec-revenue':'수익', 'sec-device':'기기 운영', 'sec-quality':'라이드 품질' };
  document.getElementById('pageTitle').textContent = titles[id] || '';
}

function setPeriod(p, btn) {
  period = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function showError(msg) {
  document.getElementById('mainContent').innerHTML = `<div class="error-card">${msg}</div>`;
}

/* ══════════════════════════════════════════════════════════════════
   Init
══════════════════════════════════════════════════════════════════ */
loadAll();
</script>
