<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TagRide Business Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── CSV URLs ─────────────────────────────────────────────────────────────────
   Google Sheets → 파일 → 공유 → 웹에 게시 → 각 시트 선택 → CSV → URL 복사
   아래 JS CONFIG 섹션의 SHEET_URLS 를 교체하세요.
──────────────────────────────────────────────────────────────────────────────── */

:root {
  --bg: #0f0f11;
  --bg2: #17171a;
  --bg3: #1e1e22;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0eff0;
  --text2: #888890;
  --text3: #555560;
  --accent: #4ade9a;
  --accent2: #3bc280;
  --accent-dim: rgba(74,222,154,0.12);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.12);
  --red: #f87171;
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.12);
  --radius: 10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

.layout { display: grid; grid-template-columns: 200px 1fr; min-height: 100vh; }

/* ─── Sidebar ─── */
.sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 24px 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.logo {
  padding: 0 20px 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.logo-tag {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}
.logo-title { font-size: 15px; font-weight: 500; color: var(--text); }
.logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

.nav-section { padding: 0 12px; margin-bottom: 8px; }
.nav-label {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0 8px;
  margin-bottom: 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 8px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--text2);
  font-size: 13px;
  transition: all 0.15s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--accent-dim); color: var(--accent); }
.nav-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  background: var(--text3);
}
.nav-item.active .nav-dot { background: var(--accent); }

.sidebar-footer {
  padding: 16px 20px 0;
  margin-top: auto;
  border-top: 1px solid var(--border);
}
.last-updated { font-size: 11px; color: var(--text3); }
.last-updated span { color: var(--text2); font-family: 'DM Mono', monospace; }

/* ─── Main ─── */
.main { overflow-y: auto; }

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
}
.topbar-title { font-size: 16px; font-weight: 500; }
.topbar-right { display: flex; align-items: center; gap: 10px; }

.period-btns { display: flex; background: var(--bg3); border-radius: var(--radius-sm); padding: 3px; gap: 2px; }
.period-btn {
  padding: 5px 14px;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.period-btn.active { background: var(--bg2); color: var(--text); }

.refresh-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.refresh-btn:hover { color: var(--text); border-color: var(--border2); }
.refresh-btn.loading { opacity: 0.5; pointer-events: none; }

.content { padding: 24px 28px; }

/* ─── Section ─── */
.section { margin-bottom: 32px; }
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.section-num {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 2px 7px;
  border-radius: 20px;
}
.section-num.blue { color: var(--blue); background: var(--blue-dim); }
.section-num.amber { color: var(--amber); background: var(--amber-dim); }
.section-title { font-size: 13px; font-weight: 500; color: var(--text2); }
.section-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  background: var(--amber-dim);
  color: var(--amber);
  font-family: 'DM Mono', monospace;
}

/* ─── KPI cards ─── */
.kpi-grid { display: grid; gap: 8px; margin-bottom: 10px; }
.kpi-grid.c2 { grid-template-columns: repeat(2, minmax(0,1fr)); }
.kpi-grid.c3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
.kpi-grid.c4 { grid-template-columns: repeat(4, minmax(0,1fr)); }

.kpi {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  transition: border-color 0.15s;
}
.kpi:hover { border-color: var(--border2); }
.kpi-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; letter-spacing: 0.02em; }
.kpi-val {
  font-size: 22px;
  font-weight: 300;
  color: var(--text);
  line-height: 1;
  font-family: 'DM Sans', sans-serif;
  margin-bottom: 5px;
}
.kpi-val.mono { font-family: 'DM Mono', monospace; font-size: 18px; }
.kpi-delta { font-size: 11px; display: flex; align-items: center; gap: 4px; }
.up { color: var(--accent); }
.dn { color: var(--red); }
.neu { color: var(--text3); }
.warn { color: var(--amber); }

/* ─── Chart cards ─── */
.chart-grid { display: grid; gap: 8px; }
.chart-grid.c2 { grid-template-columns: repeat(2, minmax(0,1fr)); }
.chart-grid.c21 { grid-template-columns: minmax(0,2fr) minmax(0,1fr); }

.chart-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
}
.chart-card-title { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.chart-card-sub { font-size: 11px; color: var(--text3); margin-bottom: 14px; }
.chart-wrap { position: relative; width: 100%; }

/* ─── Bar rank ─── */
.bar-rank { display: flex; flex-direction: column; gap: 7px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-num { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); width: 14px; text-align: right; }
.bar-label-text { font-size: 11px; color: var(--text2); width: 60px; flex-shrink: 0; }
.bar-track { flex: 1; background: var(--bg3); border-radius: 2px; height: 4px; }
.bar-fill { height: 4px; border-radius: 2px; background: var(--accent); }
.bar-val-text { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); width: 40px; text-align: right; }

/* ─── Loading / Error ─── */
.loading-screen {
  display: flex; align-items: center; justify-content: center;
  height: 60vh; flex-direction: column; gap: 12px;
}
.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 12px; color: var(--text3); }

.error-card {
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: var(--radius);
  padding: 16px 20px;
  font-size: 12px;
  color: var(--red);
  margin-bottom: 16px;
}

/* ─── Divider ─── */
.divider { height: 1px; background: var(--border); margin: 8px 0 24px; }

.no-data { font-size: 12px; color: var(--text3); padding: 20px 0; text-align: center; }

@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .kpi-grid.c3, .kpi-grid.c4 { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .chart-grid.c21 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="layout">

  <!-- ─── Sidebar ─── -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-tag">TAGRIDE</div>
      <div class="logo-title">Business Dashboard</div>
      <div class="logo-sub">G-Bike · GCOO Platform</div>
    </div>
    <nav class="nav-section">
      <div class="nav-label">지표</div>
      <button class="nav-item active" onclick="scrollTo('sec-usage')">
        <span class="nav-dot"></span> 사용량
      </button>
      <button class="nav-item" onclick="scrollTo('sec-demand')">
        <span class="nav-dot"></span> 신규 수요 검증
      </button>
      <button class="nav-item" onclick="scrollTo('sec-revenue')">
        <span class="nav-dot"></span> 수익
      </button>
      <button class="nav-item" onclick="scrollTo('sec-device')">
        <span class="nav-dot"></span> 기기 운영
      </button>
      <button class="nav-item" onclick="scrollTo('sec-quality')">
        <span class="nav-dot"></span> 라이드 품질
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="last-updated">마지막 업데이트<br><span id="lastUpdated">—</span></div>
    </div>
  </aside>

  <!-- ─── Main ─── -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">사용량</div>
      <div class="topbar-right">
        <div class="period-btns">
          <button class="period-btn active" onclick="setPeriod('monthly', this)">월</button>
          <button class="period-btn" onclick="setPeriod('weekly', this)">주</button>
          <button class="period-btn" onclick="setPeriod('daily', this)">일</button>
        </div>
        <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M10 6A4 4 0 1 1 6 2c1.1 0 2.1.45 2.83 1.17L10 2v4H6l1.59-1.59A2.5 2.5 0 1 0 8.5 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          새로고침
        </button>
      </div>
    </div>

    <div class="content" id="mainContent">
      <div class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">데이터 불러오는 중...</div>
      </div>
    </div>
  </main>
</div>

<script>
/* ══════════════════════════════════════════════════════════════════
   CONFIG — Google Sheets CSV URL 교체 영역
   Sheets → 파일 → 공유 → 웹에 게시 → 시트 선택 → CSV → URL 복사
══════════════════════════════════════════════════════════════════ */
const SHEET_URLS = {
  monthly:    'YOUR_RAW_MONTHLY_CSV_URL',
  weekly:     'YOUR_RAW_WEEKLY_CSV_URL',
  daily:      'YOUR_RAW_DAILY_CSV_URL',
  hourly:     'YOUR_RAW_HOURLY_CSV_URL',
  region:     'YOUR_RAW_REGION_CSV_URL',
  new_demand: 'YOUR_RAW_NEW_DEMAND_CSV_URL',
  device:     'YOUR_RAW_DEVICE_CSV_URL',
};

/* ══════════════════════════════════════════════════════════════════
   샘플 데이터 — URL 설정 전 미리보기용 (URL 교체 후 자동 무시됨)
══════════════════════════════════════════════════════════════════ */
const SAMPLE = {
  monthly: [
    {ym:'2025-04',ride_count:1320,completed_rides:1244,mau:498,total_revenue:3838800,rpr:2904,operated_devices:82,completion_rate:94.2,force_shutdown_cnt:12,force_shutdown_rate:0.9,total_duration_min:15480,avg_duration_min:12.4},
    {ym:'2025-05',ride_count:1510,completed_rides:1422,mau:534,total_revenue:4131048,rpr:2904,operated_devices:85,completion_rate:94.2,force_shutdown_cnt:14,force_shutdown_rate:0.9,total_duration_min:17624,avg_duration_min:12.4},
    {ym:'2025-06',ride_count:1680,completed_rides:1582,mau:571,total_revenue:4594128,rpr:2904,operated_devices:88,completion_rate:94.2,force_shutdown_cnt:16,force_shutdown_rate:1.0,total_duration_min:19616,avg_duration_min:12.4},
    {ym:'2025-07',ride_count:1890,completed_rides:1780,mau:612,total_revenue:5169120,rpr:2904,operated_devices:91,completion_rate:94.2,force_shutdown_cnt:18,force_shutdown_rate:1.0,total_duration_min:22072,avg_duration_min:12.4},
    {ym:'2025-08',ride_count:2120,completed_rides:1997,mau:689,total_revenue:5801688,rpr:2904,operated_devices:95,completion_rate:94.2,force_shutdown_cnt:20,force_shutdown_rate:0.9,total_duration_min:24764,avg_duration_min:12.4},
    {ym:'2025-09',ride_count:2341,completed_rides:2205,mau:752,total_revenue:6403320,rpr:2904,operated_devices:98,completion_rate:94.2,force_shutdown_cnt:22,force_shutdown_rate:0.9,total_duration_min:27341,avg_duration_min:12.4},
  ],
  hourly: [
    {ym:'2025-09',hour:8,ride_count:312},{ym:'2025-09',hour:9,ride_count:241},
    {ym:'2025-09',hour:10,ride_count:198},{ym:'2025-09',hour:17,ride_count:176},
    {ym:'2025-09',hour:18,ride_count:287},{ym:'2025-09',hour:19,ride_count:198},
    {ym:'2025-09',hour:20,ride_count:142},{ym:'2025-09',hour:12,ride_count:120},
  ],
  region: [
    {ym:'2025-09',region_id:486,ride_count:480},{ym:'2025-09',region_id:690,ride_count:370},
    {ym:'2025-09',region_id:487,ride_count:310},{ym:'2025-09',region_id:485,ride_count:255},
    {ym:'2025-09',region_id:710,ride_count:210},
  ],
  new_demand: [
    {ym:'2025-04',tagride_rides:520,general_rides:2800,total_rides:3320,tagride_share_pct:15.7},
    {ym:'2025-05',tagride_rides:620,general_rides:2910,total_rides:3530,tagride_share_pct:17.6},
    {ym:'2025-06',tagride_rides:710,general_rides:3050,total_rides:3760,tagride_share_pct:18.9},
    {ym:'2025-07',tagride_rides:780,general_rides:3100,total_rides:3880,tagride_share_pct:20.1},
    {ym:'2025-08',tagride_rides:810,general_rides:3140,total_rides:3950,tagride_share_pct:20.5},
    {ym:'2025-09',tagride_rides:874,general_rides:3210,total_rides:4084,tagride_share_pct:21.4},
  ],
  device: [
    {snapshot_date:'2025-09-30',registered_devices:120},
  ],
  weekly: [],
  daily: [],
};

/* ══════════════════════════════════════════════════════════════════
   State
══════════════════════════════════════════════════════════════════ */
let DATA = {};
let period = 'monthly';
let charts = {};

/* ══════════════════════════════════════════════════════════════════
   CSV fetch
══════════════════════════════════════════════════════════════════ */
function isConfigured(key) {
  return SHEET_URLS[key] && !SHEET_URLS[key].startsWith('YOUR_');
}

async function fetchCSV(key) {
  if (!isConfigured(key)) return SAMPLE[key] || [];
  return new Promise((resolve) => {
    Papa.parse(SHEET_URLS[key], {
      download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
      complete: r => resolve(r.data),
      error: () => resolve(SAMPLE[key] || []),
    });
  });
}

async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  try {
    const [monthly, weekly, daily, hourly, region, new_demand, device] = await Promise.all([
      fetchCSV('monthly'), fetchCSV('weekly'), fetchCSV('daily'),
      fetchCSV('hourly'), fetchCSV('region'), fetchCSV('new_demand'), fetchCSV('device'),
    ]);
    DATA = { monthly, weekly, daily, hourly, region, new_demand, device };
    document.getElementById('lastUpdated').textContent = new Date().toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    render();
  } catch(e) {
    showError('데이터를 불러오는 중 오류가 발생했어요: ' + e.message);
  } finally {
    btn.classList.remove('loading');
  }
}

/* ══════════════════════════════════════════════════════════════════
   Helpers
══════════════════════════════════════════════════════════════════ */
function fmt(n, digits=0) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('ko-KR', {minimumFractionDigits: digits, maximumFractionDigits: digits});
}
function fmtWon(n) {
  if (n == null || isNaN(n)) return '—';
  if (n >= 1000000) return '₩' + (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return '₩' + Math.round(n/1000) + 'K';
  return '₩' + fmt(n);
}
function delta(curr, prev, unit='%', invert=false) {
  if (!curr || !prev) return '<span class="neu">—</span>';
  const d = ((curr - prev) / prev * 100);
  const cls = invert ? (d > 0 ? 'dn' : 'up') : (d > 0 ? 'up' : 'dn');
  const arrow = d > 0 ? '▲' : '▼';
  return `<span class="${cls}">${arrow} ${Math.abs(d).toFixed(1)}${unit}</span>`;
}
function getPeriodData() { return DATA[period] || []; }
function getLatest() { const d = getPeriodData(); return d[d.length - 1] || {}; }
function getPrev() { const d = getPeriodData(); return d[d.length - 2] || {}; }
function getLatestMonthly() { const d = DATA.monthly || []; return d[d.length-1]||{}; }
function getPrevMonthly() { const d = DATA.monthly || []; return d[d.length-2]||{}; }

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};
}

const gc = 'rgba(255,255,255,0.05)';
const tc = '#555560';
const chartDefaults = {
  responsive: true, maintainAspectRatio: false,
  plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1e1e22', titleColor: '#f0eff0', bodyColor: '#888890', borderColor: 'rgba(255,255,255,0.07)', borderWidth: 1 } },
  scales: {
    x: { grid: { color: gc }, ticks: { color: tc, font: { size: 10, family: 'DM Mono' } } },
    y: { grid: { color: gc }, ticks: { color: tc, font: { size: 10, family: 'DM Mono' } } },
  }
};

/* ══════════════════════════════════════════════════════════════════
   Render
══════════════════════════════════════════════════════════════════ */
function render() {
  destroyCharts();
  const el = document.getElementById('mainContent');
  el.innerHTML = buildHTML();
  requestAnimationFrame(() => buildCharts());
}

function buildHTML() {
  const cur = getLatest(), prv = getPrev();
  const curM = getLatestMonthly(), prvM = getPrevMonthly();
  const rows = getPeriodData();
  const labels = rows.map(r => r.ym || r.week_label || r.dt || '');

  /* ── ① 사용량 ── */
  const periodLabel = period === 'monthly' ? '월' : period === 'weekly' ? '주' : '일';
  const userKey = period === 'monthly' ? 'mau' : period === 'weekly' ? 'wau' : 'dau';
  const userLabel = period === 'monthly' ? 'MAU' : period === 'weekly' ? 'WAU' : 'DAU';

  /* ── 시간대 TOP5 (항상 최신 월 기준) ── */
  const latestYm = (DATA.monthly||[]).slice(-1)[0]?.ym || '';
  const hourRows = (DATA.hourly||[]).filter(r => r.ym === latestYm)
    .sort((a,b) => b.ride_count - a.ride_count).slice(0, 5);
  const hourMax = hourRows[0]?.ride_count || 1;

  /* ── 지역 TOP5 ── */
  const regionRows = (DATA.region||[]).filter(r => r.ym === latestYm)
    .sort((a,b) => b.ride_count - a.ride_count).slice(0, 5);
  const regionMax = regionRows[0]?.ride_count || 1;

  /* ── ② 신규 수요 ── */
  const ndCur = (DATA.new_demand||[]).slice(-1)[0] || {};
  const ndPrv = (DATA.new_demand||[]).slice(-2)[0] || {};

  /* ── ④ 기기 ── */
  const devCur = (DATA.device||[]).slice(-1)[0] || {};
  const regDevices = devCur.registered_devices || 0;
  const opDevices = curM.operated_devices || 0;
  const gadongyul = regDevices ? (opDevices / regDevices * 100).toFixed(1) : '—';

  return `
  <div id="sec-usage" class="section">
    <div class="section-header">

        <div class="kpi-label">이용 건수 (${periodLabel})</div>

      </div>
      <div class="kpi">
        <div class="kpi-label">완료 건수 (${periodLabel})</div>
        <div class="kpi-val">${fmt(cur.completed_rides)}</div>

      <div class="chart-card">

        <div class="chart-card-sub">${period === 'monthly' ? '월별' : period === 'weekly' ? '주별' : '일별'} 집계 — add_time KST 기준</div>

      </div>
      <div class="chart-card">
        <div class="chart-card-title">시간대별 TOP 5</div>
        <div class="chart-card-sub">${latestYm} · KST HOUR 기준</div>
        <div class="bar-rank" style="margin-top:4px;">
          ${hourRows.length ? hourRows.map((r,i)=>`
            <div class="bar-row">
              <span class="bar-num">${i+1}</span>
              <span class="bar-label-text">${r.hour}–${r.hour+1}시</span>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.round(r.ride_count/hourMax*100)}%;${i===0?'background:#4ade9a;':'background:#2d6e54;'}"></div></div>
              <span class="bar-val-text">${fmt(r.ride_count)}건</span>
            </div>`).join('') : '<div class="no-data">데이터 없음</div>'}
        </div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-card-title">지역별 이용 건수</div>
      <div class="chart-card-sub">${latestYm} · region_id 기준 상위 5개</div>
      <div class="chart-wrap" style="height:${Math.max(regionRows.length*36+40,100)}px;">
        <canvas id="cRegion"></canvas>
      </div>

  <div class="divider"></div>

  <div id="sec-demand" class="section">
    <div class="section-header">
      <span class="section-num blue">② 신규 수요</span>
      <span class="section-title">기존 수요 대체인가, 신규 수요인가</span>
      <span class="section-badge">운영 지역 조건 적용</span>
    </div>
    <div class="kpi-grid c3" style="margin-bottom:10px;">
      <div class="kpi">
        <div class="kpi-label">태그라이드 (운영 지역)</div>
        <div class="kpi-val">${fmt(ndCur.tagride_rides)}</div>
        <div class="kpi-delta">${delta(ndCur.tagride_rides, ndPrv.tagride_rides)} vs 전월</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">일반 트립 (운영 지역)</div>
        <div class="kpi-val">${fmt(ndCur.general_rides)}</div>
        <div class="kpi-delta">${delta(ndCur.general_rides, ndPrv.general_rides)} vs 전월</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">태그라이드 비중</div>
        <div class="kpi-val mono">${ndCur.tagride_share_pct != null ? ndCur.tagride_share_pct.toFixed(1)+'%' : '—'}</div>
        <div class="kpi-delta"><span class="neu">일반 트립 동반 증가 여부 확인</span></div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-card-title">태그라이드 vs 일반 트립 추이</div>
      <div class="chart-card-sub">운영 지역 내 월별 완료 건수 비교 · 일반 트립은 order_id 범위 제한 적용</div>
      <div style="display:flex;gap:14px;margin-bottom:10px;font-size:11px;color:${tc};">
        <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:#4ade9a;display:inline-block;"></span>태그라이드</span>
        <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:#3d3d45;display:inline-block;"></span>일반 트립</span>
      </div>
      <div class="chart-wrap" style="height:130px;"><canvas id="cDemand"></canvas></div>
    </div>
  </div>

  <div class="divider"></div>

  <div id="sec-revenue" class="section">
    <div class="section-header">
      <span class="section-num amber">③ 수익</span>
      <span class="section-title">매출 현황</span>
    </div>
    <div class="kpi-grid c2">
      <div class="kpi">
        <div class="kpi-label">매출 (${periodLabel})</div>
        <div class="kpi-val">${fmtWon(cur.total_revenue)}</div>
        <div class="kpi-delta">${delta(cur.total_revenue, prv.total_revenue)} vs 전${periodLabel}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">RPR · 라이드당 평균 매출</div>
        <div class="kpi-val mono">${cur.rpr != null ? '₩'+fmt(cur.rpr) : '—'}</div>
        <div class="kpi-delta">${delta(cur.rpr, prv.rpr)} vs 전${periodLabel}</div>
      </div>
    </div>
    <div class="chart-card" style="margin-top:10px;">
      <div class="chart-card-title">매출 추이</div>
      <div class="chart-card-sub">order_amount 합산 · order_state = 2 완료 건</div>
      <div class="chart-wrap" style="height:110px;"><canvas id="cRevenue"></canvas></div>
    </div>
  </div>

  <div class="divider"></div>

  <div id="sec-device" class="section">
    <div class="section-header">
      <span class="section-num">④ 기기 운영</span>
      <span class="section-title">기기 공급 및 가동 현황</span>
    </div>
    <div class="kpi-grid c2">
      <div class="kpi">
        <div class="kpi-label">등록 기기수</div>
        <div class="kpi-val">${regDevices ? fmt(regDevices)+'대' : '—'}</div>
        <div class="kpi-delta"><span class="neu">rich_vehicle_external_iots 기준</span></div>
      </div>
      <div class="kpi">
        <div class="kpi-label">운행 기기수 (월) · 가동률</div>
        <div class="kpi-val">${opDevices ? fmt(opDevices)+'대' : '—'}</div>
        <div class="kpi-delta"><span class="${parseFloat(gadongyul)>=70?'up':parseFloat(gadongyul)>=50?'warn':'dn'}">${gadongyul !== '—' ? gadongyul + '% 가동' : '—'}</span></div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div id="sec-quality" class="section">
    <div class="section-header">
      <span class="section-num">⑤ 라이드 품질</span>
      <span class="section-title">서비스 신뢰성</span>
    </div>
    <div class="kpi-grid c4">
      <div class="kpi">
        <div class="kpi-label">완료율</div>
        <div class="kpi-val mono">${cur.completion_rate != null ? cur.completion_rate.toFixed(1)+'%' : '—'}</div>
        <div class="kpi-delta"><span class="neu">분모: rich_orders 전체 행</span></div>
      </div>
      <div class="kpi">
        <div class="kpi-label">강제 종료 건수</div>
        <div class="kpi-val">${fmt(cur.force_shutdown_cnt)}건</div>
        <div class="kpi-delta"><span class="${cur.force_shutdown_rate > 5 ? 'dn' : cur.force_shutdown_rate > 3 ? 'warn' : 'up'}">${cur.force_shutdown_rate != null ? cur.force_shutdown_rate.toFixed(1)+'%' : '—'}</span></div>
      </div>
      <div class="kpi">
        <div class="kpi-label">총 라이드 시간</div>
        <div class="kpi-val">${fmt(cur.total_duration_min)}<span style="font-size:13px;color:var(--text3);"> 분</span></div>
        <div class="kpi-delta"><span class="neu">CEIL(SUM(end−start)/60)</span></div>
      </div>
      <div class="kpi">
        <div class="kpi-label">평균 라이드 시간</div>
        <div class="kpi-val mono">${cur.avg_duration_min != null ? Number(cur.avg_duration_min).toFixed(1) : '—'}<span style="font-size:13px;color:var(--text3);"> 분</span></div>
        <div class="kpi-delta">${delta(cur.avg_duration_min, prv.avg_duration_min)} vs 전${periodLabel}</div>
      </div>
    </div>
    <div class="chart-card" style="margin-top:10px;">
      <div class="chart-card-title">완료율 · 강제 종료율 추이</div>
      <div class="chart-card-sub">forced_shutdown_admin_id != 0 기준</div>
      <div style="display:flex;gap:14px;margin-bottom:10px;font-size:11px;color:${tc};">
        <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:#4ade9a;display:inline-block;"></span>완료율 (%)</span>
        <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:#f87171;display:inline-block;"></span>강제 종료율 (%)</span>
      </div>
      <div class="chart-wrap" style="height:110px;"><canvas id="cQuality"></canvas></div>
    </div>
  </div>
  `;
}

function buildCharts() {
  const rows = getPeriodData();
  const labels = rows.map(r => r.ym || r.week_label || r.dt || '');

  /* 이용 건수 */
  const ctx1 = document.getElementById('cRideCount');
  if (ctx1) charts.rideCount = new Chart(ctx1, {
    type: 'bar',
    data: { labels, datasets: [{ data: rows.map(r=>r.ride_count), backgroundColor: '#2d6e54', borderRadius: 3, hoverBackgroundColor: '#4ade9a' }] },
    options: { ...chartDefaults, scales: { x: { grid:{color:gc}, ticks:{color:tc,font:{size:10,family:'DM Mono'}} }, y: { grid:{color:gc}, ticks:{color:tc,font:{size:10,family:'DM Mono'}} } } },
  });

  /* 지역별 */
  const latestYm = (DATA.monthly||[]).slice(-1)[0]?.ym || '';
  const regionRows = (DATA.region||[]).filter(r=>r.ym===latestYm).sort((a,b)=>b.ride_count-a.ride_count).slice(0,5);
  const ctx2 = document.getElementById('cRegion');
  if (ctx2 && regionRows.length) charts.region = new Chart(ctx2, {
    type: 'bar',
    data: {
      labels: regionRows.map(r=>'지역 '+r.region_id),
      datasets: [{ data: regionRows.map(r=>r.ride_count), backgroundColor: '#185FA5', borderRadius: 3, hoverBackgroundColor: '#60a5fa' }]
    },
    options: { ...chartDefaults, indexAxis: 'y',
      scales: { x:{grid:{color:gc},ticks:{color:tc,font:{size:10,family:'DM Mono'}}}, y:{grid:{display:false},ticks:{color:tc,font:{size:10,family:'DM Mono'}}} }
    },
  });

  /* 신규 수요 */
  const ndRows = DATA.new_demand || [];
  const ctx3 = document.getElementById('cDemand');
  if (ctx3 && ndRows.length) charts.demand = new Chart(ctx3, {
    type: 'bar',
    data: {
      labels: ndRows.map(r=>r.ym),
      datasets: [
        { label:'태그라이드', data: ndRows.map(r=>r.tagride_rides), backgroundColor: '#4ade9a', borderRadius: 3 },
        { label:'일반 트립', data: ndRows.map(r=>r.general_rides), backgroundColor: '#3d3d45', borderRadius: 3 },
      ]
    },
    options: { ...chartDefaults,
      scales: { x:{grid:{color:gc},ticks:{color:tc,font:{size:10,family:'DM Mono'}}}, y:{grid:{color:gc},ticks:{color:tc,font:{size:10,family:'DM Mono'}}} }
    },
  });

  /* 매출 */
  const ctx4 = document.getElementById('cRevenue');
  if (ctx4) charts.revenue = new Chart(ctx4, {
    type: 'line',
    data: { labels, datasets: [{ data: rows.map(r=>r.total_revenue), borderColor: '#fbbf24', backgroundColor: 'rgba(251,191,36,0.08)', pointBackgroundColor: '#fbbf24', pointRadius: 3, borderWidth: 1.5, tension: 0.3, fill: true }] },
    options: { ...chartDefaults,
      scales: { x:{grid:{color:gc},ticks:{color:tc,font:{size:10,family:'DM Mono'}}}, y:{grid:{color:gc},ticks:{color:tc,font:{size:10,family:'DM Mono'},callback:v=>'₩'+(v>=1000000?(v/1000000).toFixed(1)+'M':v>=1000?Math.round(v/1000)+'K':v)}} }
    },
  });

  /* 품질 */
  const ctx5 = document.getElementById('cQuality');
  if (ctx5) charts.quality = new Chart(ctx5, {
    type: 'line',
    data: { labels, datasets: [
      { data: rows.map(r=>r.completion_rate), borderColor: '#4ade9a', pointBackgroundColor: '#4ade9a', pointRadius: 2, borderWidth: 1.5, tension: 0.3, yAxisID: 'y' },
      { data: rows.map(r=>r.force_shutdown_rate), borderColor: '#f87171', pointBackgroundColor: '#f87171', pointRadius: 2, borderWidth: 1.5, tension: 0.3, yAxisID: 'y2' },
    ]},
    options: { ...chartDefaults,
      scales: {
        x:{grid:{color:gc},ticks:{color:tc,font:{size:10,family:'DM Mono'}}},
        y:{grid:{color:gc},ticks:{color:tc,font:{size:10,family:'DM Mono'},callback:v=>v+'%'},position:'left'},
        y2:{grid:{display:false},ticks:{color:tc,font:{size:10,family:'DM Mono'},callback:v=>v+'%'},position:'right'},
      }
    },
  });
}

/* ══════════════════════════════════════════════════════════════════
   Nav & Utils
══════════════════════════════════════════════════════════════════ */
function scrollTo(id) {
  document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick') === `scrollTo('${id}')`);
  });
  const titles = { 'sec-usage':'사용량', 'sec-demand':'신규 수요 검증', 'sec-revenue':'수익', 'sec-device':'기기 운영', 'sec-quality':'라이드 품질' };
  document.getElementById('pageTitle').textContent = titles[id] || '';
}

function setPeriod(p, btn) {
  period = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function showError(msg) {
  document.getElementById('mainContent').innerHTML = `<div class="error-card">${msg}</div>`;
}

/* ══════════════════════════════════════════════════════════════════
   Init
══════════════════════════════════════════════════════════════════ */
loadAll();
</script>
